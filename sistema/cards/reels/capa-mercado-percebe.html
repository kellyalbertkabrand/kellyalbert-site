<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>KA · Capa de Reel · Mercado percebe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#2a2a2a;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:20px;
    font-family:'Montserrat',sans-serif;
  }

  /* ============================================
     CAPA DE REEL · 1080 x 1920
     Sistema visual KA — 1 fundo + 1 cor de fonte
     ============================================ */
  .ka-reel{
    width:1080px;
    height:1920px;
    background:#152535;          /* fundo marinho */
    color:#F4F1EB;                /* texto papel */
    position:relative;
    overflow:hidden;
    display:grid;
    grid-template-rows:1100px 1fr;  /* foto em cima, texto embaixo */
  }

  /* ----- bloco da foto ----- */
  .ka-reel .photo{
    position:relative;
    width:100%;
    height:100%;
    background:#3D6B7E;            /* fallback azul essência */
    overflow:hidden;
  }
  .ka-reel .photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 18%;    /* enquadra rosto/torso */
    display:block;
  }
  /* sombra leve na borda inferior pra colar a foto no marinho */
  .ka-reel .photo::after{
    content:"";
    position:absolute;
    inset:auto 0 0 0;
    height:120px;
    background:linear-gradient(to bottom, transparent, #152535);
    pointer-events:none;
  }

  /* ----- eyebrow REEL ----- */
  .ka-reel .eyebrow{
    position:absolute;
    top:60px;
    left:88px;
    z-index:2;
    font-size:20px;
    letter-spacing:.32em;
    text-transform:uppercase;
    font-weight:700;
    color:#F4F1EB;
    background:rgba(21,37,53,.72);
    padding:10px 18px;
  }

  /* ----- bloco de texto ----- */
  .ka-reel .body{
    padding:60px 88px 88px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }

  .ka-reel .title{
    font-family:'Playfair Display', Georgia, serif;
    font-size:104px;
    line-height:1.04;
    letter-spacing:-.025em;
    font-weight:600;
    max-width:90%;
  }
  .ka-reel .title em{font-style:italic;font-weight:600}

  .ka-reel .footer{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    margin-top:48px;
  }
  .ka-reel .support{
    font-size:22px;
    line-height:1.45;
    opacity:.78;
    max-width:60%;
    font-weight:400;
  }
  .ka-reel .sig{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .ka-reel .sig .mark{
    font-family:'Playfair Display', Georgia, serif;
    font-size:64px;
    line-height:.7;
    letter-spacing:-.08em;
    font-weight:600;
  }
  .ka-reel .sig .meta{
    border-left:1px solid rgba(244,241,235,.45);
    padding-left:14px;
    font-size:13px;
    letter-spacing:.26em;
    line-height:1.2;
    text-transform:uppercase;
    opacity:.85;
  }

  /* canto decorativo discreto */
  .ka-reel .corner{
    position:absolute;
    top:60px;
    right:60px;
    width:42px;
    height:42px;
    border-top:1.5px solid rgba(244,241,235,.45);
    border-right:1.5px solid rgba(244,241,235,.45);
    z-index:2;
  }

  /* impressão */
  @media print{
    @page{size:1080px 1920px;margin:0}
    body{padding:0;background:#fff}
    .ka-reel{box-shadow:none}
  }
</style>
</head>
<body>

  <article class="ka-reel">
    <!-- 1. Substitua kelly.jpg pelo nome da sua foto na mesma pasta -->
    <div class="photo">
      <img src="kelly.jpg" alt="Kelly Albert" onerror="this.style.display='none'">
    </div>
    <span class="eyebrow">REEL</span>
    <span class="corner"></span>

    <div class="body">
      <h1 class="title">
        Sua marca entrega valor,<br>
        mas o mercado<br>
        <em>percebe isso?</em>
      </h1>

      <div class="footer">
        <p class="support">O que o mercado não percebe, ele não compra.</p>
        <div class="sig">
          <span class="mark">KA</span>
          <span class="meta">Inteligência<br>para Marcas</span>
        </div>
      </div>
    </div>
  </article>

</body>
</html>
