name: Create MailerLite campaigns

on:
  push:
    branches: [main]
    paths:
      - 'campaigns/**/*.md'
      - 'scripts/create-campaigns.mjs'
      - 'scripts/package.json'
      - '.github/workflows/mailerlite-campaigns.yml'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run script
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_FROM_EMAIL: ${{ secrets.MAILERLITE_FROM_EMAIL }}
          MAILERLITE_FROM_NAME: ${{ secrets.MAILERLITE_FROM_NAME }}
          MAILERLITE_DEFAULT_GROUP_ID: ${{ secrets.MAILERLITE_DEFAULT_GROUP_ID }}
        run: node scripts/create-campaigns.mjs
