<!--
  COMPONENTE: HEAD padrão de página do site KA
  Uso: substituir {{TITLE}}, {{DESCRIPTION}}, {{PATH}} ao copiar numa página nova.
  {{PATH}} = caminho absoluto sem trailing slash (ex: "/livro", "/direcao")
  Inclui: link para /css/style.css, favicon, manifest, Open Graph.
-->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta property="og:title" content="{{TITLE}} | KA Inteligência para Marcas">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:type" content="website">
<meta property="og:image" content="https://kellyalbert.com.br/images/kelly-hero.jpg">
<meta property="og:locale" content="pt_BR">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://kellyalbert.com.br{{PATH}}/">
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#F4F1EB">
</head>
